<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pocket Advisor</title>
  <script>
    // GitHub Pages SPA redirect: stores the path in sessionStorage
    // and redirects to index.html, which picks it up and navigates
    var pathSegmentsToKeep = 1; // keep /pocket-advisor/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
